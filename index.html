<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Кубики Бали</title>
</head>
<body>

    <h2 id="turnNum">Очередь игрока</h2>

    <div class="buttons">
        <select id="playersSelect">
            <option value="2">2 игрока</option>
            <option value="3">3 игрока</option>
            <option value="4">4 игрока</option>
        </select>

        <button id="newGame">Новая игра</button>
        <button id="rollDice">Бросить кубики</button>
    </div>

    <p id="diceResult"></p>
    <div id="choiceBtns"></div>

    <div class="players" id="playersContainer"></div>

    <h3 id="winner"></h3>

    <script src="main.js"></script>
</body>
</html>
